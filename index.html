<!DOCTYPE html>
<html>
    <head>
        <title>コード進行</title>
    </head>
    <body>
        <!--説明-->
        <h1>相対音感トレーニング〜コード進行〜</h1>
        <h2>説明</h2>
        <p>コード進行を度数で当てるトレーニングです。</p>
        <h2>使用方法</h2>
        <p>「スタート」ボタンを押して問題を開始します</p>
        <p>「主音」ボタンを押すと基準となるIの和音を聴くことができます</p>
        <p>「コード進行」ボタンを押すと問題のコード進行を聴けます</p>
        <p>「答え」ボタンを押すと答えが見れます</p>

        <!--UI-->
        <button type="button" id="start">スタート</button>
        <button type="button" id="hearIChord">主音を聴く</button>
        <button type="button" id="progress">コード進行</button>
        
    </body>
</html>
